<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crime Recording Assessment</title>
  <link rel="stylesheet" href="/styles.css?v=5">
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>Crime Recording Assessment</h1>
        <p class="subtitle">Decision support for Home Office crime-recording rules</p>
      </div>
      <nav class="header-nav">
        <button id="nav-new" class="nav-btn active">New</button>
        <button id="nav-history" class="nav-btn">History</button>
        <button id="nav-knowledge" class="nav-btn">Documents</button>
      </nav>
    </div>
  </header>

  <main>
    <div class="banner">
      This tool provides decision support only. The recording decision rests with the trained user.
    </div>

    <div id="error-banner" class="error-banner" hidden></div>

    <section id="page-new">
      <section id="log-input">
        <h2>Assess a log</h2>

        <div class="input-tabs">
          <button class="tab active" data-tab="paste">Paste text</button>
          <button class="tab" data-tab="upload">Upload file</button>
        </div>

        <div id="tab-paste" class="tab-panel">
          <textarea id="log-text" placeholder="Paste the police log here..." rows="10"></textarea>
        </div>

        <div id="tab-upload" class="tab-panel" hidden>
          <label class="file-drop" id="file-drop">
            <input type="file" id="log-file" accept=".txt,.pdf,.docx">
            <span>Choose a file (.txt, .pdf, .docx) or drag it here</span>
          </label>
          <p id="file-name" class="file-name"></p>
        </div>

        <label class="redact-toggle">
          <input type="checkbox" id="redact-toggle">
          Redact names and identifiers before sending to AI
        </label>

        <button id="assess-btn" class="btn-primary">Assess</button>
      </section>

      <section id="results" hidden>
        <div class="section-header">
          <h2>Assessment results</h2>
          <button id="new-assessment-btn" class="btn-secondary">New assessment</button>
        </div>
        <div id="results-content"></div>
      </section>

      <section id="report-section" hidden>
        <div class="section-header">
          <h2>Report</h2>
          <button id="export-report-btn" class="btn-secondary">Export / Print</button>
        </div>
        <div id="report-content"></div>
      </section>
    </section>

    <section id="page-history" hidden>
      <h2>Assessment history</h2>
      <div id="history-list"></div>
    </section>

    <section id="page-knowledge" hidden>
      <h2>Loaded source documents</h2>
      <div id="knowledge-list"></div>
    </section>
  </main>

  <footer>
    <span id="health-status">Checking connection...</span>
  </footer>

  <script src="/app.js?v=5"></script>
</body>
</html>
